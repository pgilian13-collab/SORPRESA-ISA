<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuerdos con Isa</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb199);
color:white;
text-align:center;
overflow-x:hidden;
}

/* titulo */

.titulo{
margin-top:30px;
font-size:35px;
text-shadow:0 0 20px white;
animation:brillar 3s infinite;
}

/* galeria */

.galeria{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:20px;
}

/* imagen */

.galeria img{
width:100%;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
cursor:pointer;
}

.galeria img:hover{
transform:scale(1.1);
}

/* boton volver */

.volver{
margin:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:#ff4f81;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.volver:hover{
transform:scale(1.1);
}

/* corazones */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:caer linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

@keyframes brillar{
0%{text-shadow:0 0 10px white}
50%{text-shadow:0 0 25px white}
100%{text-shadow:0 0 10px white}
}

</style>

</head>

<body>

<h1 class="titulo">Momentos contigo Isa 💖</h1>

<div class="galeria" id="galeria"></div>

<a href="menu.html">
<button class="volver">⬅ Volver</button>
</a>

<script>

/* cargar imagenes del 1 al 6 */

const galeria = document.getElementById("galeria")

for(let i=1;i<=6;i++){

let img=document.createElement("img")

img.src=i+".png"

galeria.appendChild(img)

}

/* corazones cayendo */

function crearCorazon(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*20+15)+"px"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(crearCorazon,200)

</script>

</body>
</html>
