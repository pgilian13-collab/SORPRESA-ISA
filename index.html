<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorpresa para Isa</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
overflow:hidden;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb199);
color:white;
}

.titulo{
font-size:38px;
text-shadow:0 0 20px white;
animation:brillar 3s infinite;
}

.boton{
margin-top:40px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff4f81;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.boton:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:caer linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

@keyframes brillar{
0%{text-shadow:0 0 10px white}
50%{text-shadow:0 0 25px white}
100%{text-shadow:0 0 10px white}
}

</style>

</head>

<body>

<audio id="musica" loop>
<source src="mañanitas.mp3" type="audio/mpeg">
</audio>

<div>

<h1 class="titulo">Una sorpresa para Isa ✨</h1>

<button class="boton" onclick="iniciar()">
Abrir sorpresa 🎁
</button>

</div>

<script>

function iniciar(){

const audio = document.getElementById("musica")

audio.play()

/* espera 2 segundos antes de cambiar de página */

setTimeout(function(){
window.location.href="menu.html"
},2000)

}

/* corazones */

function crearCorazon(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*20+15)+"px"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(crearCorazon,200)

</script>

</body>
</html>
